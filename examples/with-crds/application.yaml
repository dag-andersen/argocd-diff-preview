apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-helm-chart
  namespace: argocd
spec:
  project: default
  source:
    chart: argo-cd
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 9.1.4
    helm:
      parameters:
        - name: controller.metrics.enabled
          value: "true"
        - name: controller.metrics.serviceMonitor.enabled
          value: "true"
        - name: controller.metrics.serviceMonitor.interval
          value: "15s"
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
