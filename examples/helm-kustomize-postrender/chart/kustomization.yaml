apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The CMP plugin runs:
#   helm template . -f values.yaml --name-template $ARGOCD_APP_NAME ... > all.yaml
#   kustomize build
#
# So at render time, all.yaml contains the helm output with the Deployment
# named after $ARGOCD_APP_NAME (e.g. "my-app" in real ArgoCD).
#
# BUG: argocd-diff-preview renames the Application to "b-target-my-app" before
# submitting it, so $ARGOCD_APP_NAME = "b-target-my-app" and the Deployment is
# also named "b-target-my-app". But the patch below still targets "my-app",
# causing kustomize to fail with a "no matching resource" error.
resources:
  - all.yaml

patches:
  - path: patches/add-labels.yaml
