apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Render the local helm chart and give the release the same name as the
# ArgoCD Application ("my-app"). This mirrors what the reporter's CMP does:
#   helm template . --name-template $ARGOCD_APP_NAME ...
# The rendered Deployment will therefore be named "my-app".
helmCharts:
  - name: my-app
    releaseName: my-app
    includeCRDs: false
    chartHome: ../chart
    valuesFile: ../chart/values.yaml

# Patch the Deployment that was rendered above.
# The patch targets it by name "my-app" — the exact name produced by helm.
# THIS IS WHAT BREAKS: when argocd-diff-preview renames the Application to
# e.g. "b-target-my-app", it also updates spec.source.helm.releaseName (if
# present) or the CMP sees a different $ARGOCD_APP_NAME, so the Deployment
# gets a different name and this patch no longer finds a match.
patches:
  - path: patches/add-labels.yaml
