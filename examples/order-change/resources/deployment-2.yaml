apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-change-example-deploy-2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: example-deploy-2
  template:
    metadata:
      labels:
        app: example-deploy-2
    spec:
      containers:
        - name: myapp
          image: dag-andersen/myapp:latest
          ports:
            - containerPort: 80
