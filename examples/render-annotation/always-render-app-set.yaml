apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: always-render-annotation-appset-example
  namespace: argocd
  annotations:
    argocd-diff-preview/render: "always"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: test
  template:
    metadata:
      name: "always-render-annotation-appset-{{ .name }}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd-diff-preview/render: "always"
    spec:
      project: default
      sources:
        - chart: ingress-nginx
          repoURL: "https://kubernetes.github.io/ingress-nginx"
          targetRevision: 4.10.0
          helm:
            valuesObject:
              controller:
                ingressClass: "{{ .name }}"
      destination:
        name: in-cluster
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
